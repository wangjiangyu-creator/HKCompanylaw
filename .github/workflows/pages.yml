name: Publish public site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate content
        run: pnpm validate:content

      - name: Build site
        run: pnpm build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      - name: Publish built site to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf ../site-deploy
          git fetch origin gh-pages
          git worktree add ../site-deploy origin/gh-pages
          rsync -a --delete --exclude ".git" dist/ ../site-deploy/
          cd ../site-deploy
          git add -A
          if git diff --cached --quiet; then
            echo "No public-site changes to publish."
            exit 0
          fi
          git commit -m "Deploy public site"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
